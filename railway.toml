# ============================================================
# Railway - Configuración de Deployment
# Opción alternativa: servidor siempre activo en Railway (~$5/mes)
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash scripts/start-production.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "bodega-automatizada"
