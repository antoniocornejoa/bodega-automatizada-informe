# ============================================================
# GitHub Actions - Reporte Semanal Bodega
# Corre todos los lunes a las 12:00 (hora Chile, UTC-3 15:00 UTC)
# Alternativa GRATIS a Replit Deployments
# ============================================================

name: Reporte Semanal Bodega

on:
  schedule:
    - cron: '0 15 * * 1'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo prueba (no envia email)'
        required: false
        default: 'false'

jobs:
  run-bodega-report:
    name: Ejecutar Reporte de Bodega
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
        run: npm install --legacy-peer-deps

      - name: Ejecutar Reporte Bodega
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ICONSTRUYE_USERNAME: ${{ secrets.ICONSTRUYE_USERNAME }}
          ICONSTRUYE_PASSWORD: ${{ secrets.ICONSTRUYE_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: npx tsx scripts/run-direct.ts

      - name: Notificar falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('El reporte de bodega fallo. Revisar logs en:', context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId);
