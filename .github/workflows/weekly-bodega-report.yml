# ============================================================
# GitHub Actions - Reporte Semanal Bodega
# Corre todos los lunes a las 12:00 (hora Chile, UTC-3 → 15:00 UTC)
# Alternativa GRATIS a Replit Deployments
# ============================================================

name: Reporte Semanal Bodega

on:
  # Cron: lunes 15:00 UTC = 12:00 Chile (horario normal)
  schedule:
    - cron: '0 15 * * 1'

  # También permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo prueba (no envía email)'
        required: false
        default: 'false'

jobs:
  run-bodega-report:
    name: Ejecutar Reporte de Bodega
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 22
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instalar Chrome para Puppeteer
      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser)" >> $GITHUB_ENV
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true" >> $GITHUB_ENV

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      # 5. Build del proyecto
      - name: Build Mastra
        run: npm run build

      # 6. Ejecutar el workflow de bodega directamente
      - name: Ejecutar Reporte Bodega
        env:
          # Base de datos
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          # Google Sheets
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}

          # Gmail
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

          # iConstruye
          ICONSTRUYE_USERNAME: ${{ secrets.ICONSTRUYE_USERNAME }}
          ICONSTRUYE_PASSWORD: ${{ secrets.ICONSTRUYE_PASSWORD }}

          # OpenAI (para el agente Mastra)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # Anthropic Claude (para auto-corrección de código)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Modo de ejecución
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SCHEDULE_CRON_EXPRESSION: "0 15 * * 1"

          # Puppeteer
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

        run: node scripts/run-workflow-once.mjs

      # 7. Notificar si falla (email/Slack)
      - name: Notificar falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('❌ El reporte de bodega falló. Revisar logs en:', context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId);
